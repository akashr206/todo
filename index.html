<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant ToDo | Simple & Productive</title>
    <meta name="description" content="A minimal and elegant ToDo application for maximum productivity.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Todo - List your todos</h1>
            <p class="subtitle">What's on your mind today?</p>
        </header>

        <div class="input-group">
            <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off">
            <button id="add-btn">Add</button>
        </div>

        <ul id="todo-list">
            
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
